name: Daily MLOps Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC every day
  workflow_dispatch: # Allows you to manually click "Run" in GitHub

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Allows the bot to push code back to the repo
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Training Pipeline
        run: |
          python train_pipeline.py
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hybrid_preprocessor.pkl tuned_stress_model.pkl questions_schema.json
          # If the models or schema changed, commit and push them
          git commit -m "🤖 Auto-Update: Retrained models and updated UI schema" || echo "No changes to commit"
          git push
